name: CI Pipeline

run-name: ${{ github.event.head_commit.message || github.event.pull_request.title || github.ref_name }}

on:
  push:
    branches: [ develop, develop/* ]
  pull_request:
    branches: [ main, develop, develop/* ]

jobs:
  lint-and-format:
    name: Linting and Code Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install ".[dev]"

      - name: Check code formatting with Black
        run: |
          black etl/ tests/ --check --diff

      - name: Lint with flake8
        run: |
          flake8 etl/ --max-line-length=100 --ignore=E501,W503

      - name: Lint with pylint
        run: |
          pylint etl/ --disable=C0111,R0903,C0103 || true

  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=etl --cov=tests --cov-report=xml --cov-report=term

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  integration-test-local:
    name: Local Integration Test
    runs-on: ubuntu-latest
    needs: [lint-and-format, test]

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install .

      - name: Create test data directories
        run: |
          mkdir -p data/bronze data/silver data/gold

      - name: Verify ETL module imports
        run: |
          python -c "from etl.jobs.bronze.taxi_ingestion_job import TaxiIngestionJob; print('✓ Bronze ingestion module OK')"
          python -c "from etl.jobs.gold.taxi_gold_job import TaxiGoldJob; print('✓ Gold transformation module OK')"
          python -c "from etl.jobs.load.postgres_load_job import PostgresLoadJob; print('✓ Postgres load module OK')"
          python -c "from etl.jobs.bronze.zone_lookup_ingestion_job import ZoneLookupIngestionJob; print('✓ Zone lookup module OK')"
        env:
          GCS_BUCKET: test-bucket
          GCP_PROJECT_ID: test-project

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v3

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
