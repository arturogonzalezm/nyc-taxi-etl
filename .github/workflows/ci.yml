name: CI/CD Pipeline

run-name: ${{ github.event.head_commit.message || github.event.pull_request.title || github.ref_name }}

on:
  push:
    branches: [main, develop, 'develop/*']
  pull_request:
    branches: [main, develop, 'develop/*']

env:
  TF_VERSION: '1.5.0'
  WORKING_DIR: './terraform'

jobs:
  # =============================================================================
  # STAGE 1: Linting and Code Format
  # =============================================================================
  lint-and-format:
    name: 1. Linting and Code Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Check code formatting with Black
        run: black etl/ tests/ --check --diff

      - name: Lint with flake8
        run: flake8 etl/ --max-line-length=100 --ignore=E501,W503

      - name: Lint with pylint
        run: pylint etl/ --disable=C0111,R0903,C0103 || true

  # =============================================================================
  # STAGE 2: Validate Terraform
  # =============================================================================
  terraform-validate:
    name: 2. Validate Terraform
    runs-on: ubuntu-latest
    needs: [lint-and-format]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

  # =============================================================================
  # STAGE 3: Security Scan
  # =============================================================================
  security-scan:
    name: 3. Security Scan
    runs-on: ubuntu-latest
    needs: [terraform-validate]
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

  # =============================================================================
  # STAGE 4: Unit Tests
  # =============================================================================
  unit-tests:
    name: 4. Unit Tests
    runs-on: ubuntu-latest
    needs: [security-scan]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=etl --cov=tests --cov-report=xml --cov-report=term

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # =============================================================================
  # STAGE 5: Integration Tests
  # =============================================================================
  integration-tests:
    name: 5. Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install .

      - name: Create test data directories
        run: mkdir -p data/bronze data/silver data/gold

      - name: Verify ETL module imports
        run: |
          python -c "from etl.jobs.bronze.taxi_ingestion_job import TaxiIngestionJob; print('✓ Bronze ingestion module OK')"
          python -c "from etl.jobs.gold.taxi_gold_job import TaxiGoldJob; print('✓ Gold transformation module OK')"
          python -c "from etl.jobs.load.postgres_load_job import PostgresLoadJob; print('✓ Postgres load module OK')"
          python -c "from etl.jobs.bronze.zone_lookup_ingestion_job import ZoneLookupIngestionJob; print('✓ Zone lookup module OK')"
        env:
          GCS_BUCKET: test-bucket
          GCP_PROJECT_ID: test-project

  # =============================================================================
  # STAGE 6: Terraform Deploy (only on push, not PRs)
  # =============================================================================
  deploy-dev:
    name: 6. Terraform Deploy (Dev)
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/develop/'))
    permissions:
      contents: read
      id-token: write
    env:
      ENVIRONMENT: 'dev'
      PROJECT_ID: 'nyc-taxi-etl-dev-001'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Import existing resources (if not in state)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          # Import service account if exists but not in state
          SA_EMAIL="nyc-taxi-etl-${{ env.ENVIRONMENT }}-sa-001@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          if gcloud iam service-accounts describe "$SA_EMAIL" --project="${{ env.PROJECT_ID }}" &>/dev/null; then
            terraform import -var="billing_account_id=${{ secrets.GCP_BILLING_ACCOUNT_ID }}" \
              -var="github_repository=${{ github.repository }}" \
              -var="environment=${{ env.ENVIRONMENT }}" \
              google_service_account.nyc_taxi_sa \
              "projects/${{ env.PROJECT_ID }}/serviceAccounts/$SA_EMAIL" 2>/dev/null || true
          fi

          # Import workload identity pool if exists but not in state
          if gcloud iam workload-identity-pools describe github-actions-pool \
            --location=global --project="${{ env.PROJECT_ID }}" &>/dev/null; then
            terraform import -var="billing_account_id=${{ secrets.GCP_BILLING_ACCOUNT_ID }}" \
              -var="github_repository=${{ github.repository }}" \
              -var="environment=${{ env.ENVIRONMENT }}" \
              google_iam_workload_identity_pool.github_pool \
              "projects/${{ env.PROJECT_ID }}/locations/global/workloadIdentityPools/github-actions-pool" 2>/dev/null || true
          fi

          # Import workload identity provider if exists but not in state
          if gcloud iam workload-identity-pools providers describe github-provider \
            --workload-identity-pool=github-actions-pool \
            --location=global --project="${{ env.PROJECT_ID }}" &>/dev/null; then
            terraform import -var="billing_account_id=${{ secrets.GCP_BILLING_ACCOUNT_ID }}" \
              -var="github_repository=${{ github.repository }}" \
              -var="environment=${{ env.ENVIRONMENT }}" \
              google_iam_workload_identity_pool_provider.github_provider \
              "projects/${{ env.PROJECT_ID }}/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider" 2>/dev/null || true
          fi

          # Import GCS bucket if exists but not in state
          BUCKET_NAME="nyc-taxi-etl-${{ env.ENVIRONMENT }}-gcs-us-central1-001"
          if gsutil ls -b "gs://$BUCKET_NAME" &>/dev/null; then
            terraform import -var="billing_account_id=${{ secrets.GCP_BILLING_ACCOUNT_ID }}" \
              -var="github_repository=${{ github.repository }}" \
              -var="environment=${{ env.ENVIRONMENT }}" \
              google_storage_bucket.nyc_taxi_etl \
              "$BUCKET_NAME" 2>/dev/null || true
          fi

      - name: Terraform Plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform plan \
            -var="billing_account_id=${{ secrets.GCP_BILLING_ACCOUNT_ID }}" \
            -var="github_repository=${{ github.repository }}" \
            -var="environment=${{ env.ENVIRONMENT }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

  deploy-prod:
    name: 6. Terraform Deploy (Prod)
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    env:
      ENVIRONMENT: 'prod'
      PROJECT_ID: 'nyc-taxi-etl-prod-001'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: Import existing resources (if not in state)
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          # Import service account if exists but not in state
          SA_EMAIL="nyc-taxi-etl-${{ env.ENVIRONMENT }}-sa-001@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          if gcloud iam service-accounts describe "$SA_EMAIL" --project="${{ env.PROJECT_ID }}" &>/dev/null; then
            terraform import -var="billing_account_id=${{ secrets.GCP_BILLING_ACCOUNT_ID }}" \
              -var="github_repository=${{ github.repository }}" \
              -var="environment=${{ env.ENVIRONMENT }}" \
              google_service_account.nyc_taxi_sa \
              "projects/${{ env.PROJECT_ID }}/serviceAccounts/$SA_EMAIL" 2>/dev/null || true
          fi

          # Import workload identity pool if exists but not in state
          if gcloud iam workload-identity-pools describe github-actions-pool \
            --location=global --project="${{ env.PROJECT_ID }}" &>/dev/null; then
            terraform import -var="billing_account_id=${{ secrets.GCP_BILLING_ACCOUNT_ID }}" \
              -var="github_repository=${{ github.repository }}" \
              -var="environment=${{ env.ENVIRONMENT }}" \
              google_iam_workload_identity_pool.github_pool \
              "projects/${{ env.PROJECT_ID }}/locations/global/workloadIdentityPools/github-actions-pool" 2>/dev/null || true
          fi

          # Import workload identity provider if exists but not in state
          if gcloud iam workload-identity-pools providers describe github-provider \
            --workload-identity-pool=github-actions-pool \
            --location=global --project="${{ env.PROJECT_ID }}" &>/dev/null; then
            terraform import -var="billing_account_id=${{ secrets.GCP_BILLING_ACCOUNT_ID }}" \
              -var="github_repository=${{ github.repository }}" \
              -var="environment=${{ env.ENVIRONMENT }}" \
              google_iam_workload_identity_pool_provider.github_provider \
              "projects/${{ env.PROJECT_ID }}/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider" 2>/dev/null || true
          fi

          # Import GCS bucket if exists but not in state
          BUCKET_NAME="nyc-taxi-etl-${{ env.ENVIRONMENT }}-gcs-us-central1-001"
          if gsutil ls -b "gs://$BUCKET_NAME" &>/dev/null; then
            terraform import -var="billing_account_id=${{ secrets.GCP_BILLING_ACCOUNT_ID }}" \
              -var="github_repository=${{ github.repository }}" \
              -var="environment=${{ env.ENVIRONMENT }}" \
              google_storage_bucket.nyc_taxi_etl \
              "$BUCKET_NAME" 2>/dev/null || true
          fi

      - name: Terraform Plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform plan \
            -var="billing_account_id=${{ secrets.GCP_BILLING_ACCOUNT_ID }}" \
            -var="github_repository=${{ github.repository }}" \
            -var="environment=${{ env.ENVIRONMENT }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -auto-approve tfplan
